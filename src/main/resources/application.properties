# ==========================================
# APPLICATION NAME
# ==========================================
spring.application.name=report-generator

# ==========================================
# DATABASE CONFIGURATION
# Tell Spring Boot how to connect to MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/report_generator_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:2003}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
# validate = Hibernate checks DB matches our entities (safe for production)
# update  = Hibernate auto-changes DB (risky, we use Flyway instead)
# none    = Do nothing (we use this since Flyway handles schema)
spring.jpa.hibernate.ddl-auto=validate

# Shows the actual SQL queries in console (helpful for learning)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ==========================================
# FLYWAY CONFIGURATION
# Flyway will auto-run migration SQL files
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ==========================================
# FILE STORAGE
# Where generated report files will be saved
# ==========================================
report.storage.path=C:/reports/

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080

# ==========================================
# ASYNC THREAD POOL
# We'll reference these values in AsyncConfig.java
# ==========================================
async.core-pool-size=5
async.max-pool-size=10
async.queue-capacity=50
async.thread-name-prefix=ReportThread-

# Quartz Scheduler
spring.quartz.job-store-type=memory
spring.quartz.overwrite-existing-jobs=true
```

`job-store-type=memory` means Quartz keeps its schedule in RAM (not a separate DB table). This is fine for our project.
